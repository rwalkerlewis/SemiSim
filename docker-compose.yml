# Local bind-mount development: source code on the host, dolfinx + Python
# inside the container. Edits on the host are visible immediately thanks to
# the editable install of `semi`.
#
# Usage:
#   docker compose build           # build once
#   docker compose up -d dev       # start long-running dev container
#   docker compose exec dev bash   # shell in
#   docker compose run --rm test   # run the test suite
#   docker compose up jupyter      # launch JupyterLab on :8888

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    image: semisim:dev
    container_name: SemiSim-dev
    working_dir: /workspaces/SemiSim
    volumes:
      - .:/workspaces/SemiSim:cached
    # Keep the container alive for `docker compose exec`.
    command: sleep infinity
    stdin_open: true
    tty: true

  test:
    image: semisim:dev
    working_dir: /workspaces/SemiSim
    volumes:
      - .:/workspaces/SemiSim:cached
    command: pytest

  benchmark:
    image: semisim:dev
    working_dir: /workspaces/SemiSim
    volumes:
      - .:/workspaces/SemiSim:cached
    environment:
      - MPLBACKEND=Agg
    entrypoint: ["python", "scripts/run_benchmark.py"]
    command: ["pn_1d"]

  jupyter:
    image: semisim:dev
    working_dir: /workspaces/SemiSim
    volumes:
      - .:/workspaces/SemiSim:cached
    ports:
      - "8888:8888"
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --ServerApp.token=''
        --ServerApp.password=''
        --ServerApp.root_dir=/workspaces/SemiSim

  server:
    image: semisim:dev
    working_dir: /workspaces/SemiSim
    command: semisim-server
    environment:
      SEMISIM_SERVER_HOST: "0.0.0.0"
      SEMISIM_SERVER_PORT: "8000"
      SEMISIM_SERVER_WORKERS: "2"
      SEMISIM_SERVER_RUNS_DIR: "/workspaces/SemiSim/runs"
    ports:
      - "8000:8000"
    volumes:
      - .:/workspaces/SemiSim:cached
